name: Build

on:
  push:
    branches: [main]
  pull_request:

env:
  GOTOOLCHAIN: local

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          version: 2026.5.16 # renovate: datasource=github-releases depName=jdx/mise

      - name: Run GoReleaser
        run: goreleaser release --clean --snapshot --skip=sign

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Preview Binaries
          path: dist/hcloud-*/hcloud

      - name: Check for release errors
        run: scripts/check-release-error.sh
