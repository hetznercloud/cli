name: Links

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "43 12 * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          fail: true
          args: >
            --root-dir ${{ github.workspace }}
            --verbose
            --no-progress
            --cache
            --max-cache-age 2d
            --include-fragments
            --exclude 'api.hetzner.cloud'
            --exclude 'api.hetzner.com'
            --exclude 'asciinema.org'
            --exclude 'codecov.io'
            --exclude 'github.com'
            --exclude '169.254.169.254'
            --exclude 'https://docs.hetzner.cloud/changelog#new-product'
            --exclude 'https://docs.hetzner.cloud/reference/cloud#'
            --exclude 'https://docs.hetzner.cloud/reference/hetzner#'
            --exclude 'https://style-guide.europa.eu/en/content/-/isg/topic'
            --exclude 'https://www.hetzner.com/news/arm64-cloud'
            --exclude 'https://docs.hetzner.com/networking/dns/faq/beta/'
            --exclude 'https://docs.hetzner.com/networking/dns/migration-to-hetzner-console/process/'
            '**/*.md'
            '**/*.go'
